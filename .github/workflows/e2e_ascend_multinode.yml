name: e2e_ascend_multinode

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - v0.*
    paths:
      - "**/*.py"
      - "verl/**"
      - "tests/special_npu/**"
      - "tests/special_e2e/**"
      - "examples/data_preprocess/**"
      - "pyproject.toml"
      - "setup.py"
      - "requirements-npu.txt"
      - "docker/**"
      - ".github/workflows/e2e_ascend_multinode.yml"
  pull_request:
    branches:
      - main
    paths:
      - "verl/**"
      - "tests/special_npu/**"
      - "tests/special_e2e/**"
      - "examples/data_preprocess/**"
      - "pyproject.toml"
      - "setup.py"
      - "requirements-npu.txt"
      - "docker/**"
      - ".github/workflows/e2e_ascend_multinode.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  SUBMITTER_URL: http://rayjob-submitter.ci-system.svc.cluster.local
  IMAGE: quay.io/ascend/verl:verl-9.0.0-910b-ubuntu22.04-py3.11-latest
  WORKER_REPLICAS: "2"

jobs:
  ascend-rayjob-e2e:
    if: github.repository_owner == 'verl-project'
    name: E2E Ascend RayJob multinode PPO
    runs-on: linux-aarch64-a2b3-8
    timeout-minutes: 240
    container:
      image: quay.io/albert54/actions-runner:ubuntu-24.04
      options: >-
        --dns 10.96.0.10
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      - name: Copy checkout to shared cache
        run: |
          sudo rm -rf /root/.cache/cicd_test/verl
          sudo mkdir -p /root/.cache/cicd_test/verl
          tar \
            --exclude=.git \
            --exclude=.venv \
            --exclude=__pycache__ \
            --exclude=.pytest_cache \
            -cf - . | sudo tar -xf - -C /root/.cache/cicd_test/verl
          sudo chmod -R 777 /root/.cache/cicd_test/verl
          sudo ls -l /root/.cache/cicd_test

      - name: Prepare RayJob submit helper
        run: |
          cat > /tmp/submit_and_wait_rayjob.sh <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          name_suffix="$1"
          script="$2"
          args_json="${3:-}"
          env_json="${4:-}"

          if [[ -z "${args_json}" ]]; then
              args_json='[]'
          fi

          if [[ -z "${env_json}" ]]; then
              env_json='{}'
          fi

          : "${SUBMITTER_URL:?SUBMITTER_URL is required}"
          : "${IMAGE:?IMAGE is required}"
          : "${GITHUB_REPOSITORY:?GITHUB_REPOSITORY is required}"
          : "${GITHUB_SHA:?GITHUB_SHA is required}"
          : "${GITHUB_REF_NAME:?GITHUB_REF_NAME is required}"
          : "${GITHUB_RUN_ID:?GITHUB_RUN_ID is required}"

          github_run_attempt="${GITHUB_RUN_ATTEMPT:-1}"
          worker_replicas="${WORKER_REPLICAS:-2}"

          echo "========== Validate local JSON inputs =========="
          echo "args_json=${args_json}"
          echo "env_json=${env_json}"
          echo "worker_replicas=${worker_replicas}"

          args_json_compact="$(printf '%s' "${args_json}" | jq -c 'if type == "array" then . else error("args must be a JSON array") end')"
          env_json_compact="$(printf '%s' "${env_json}" | jq -c 'if type == "object" then . else error("env must be a JSON object") end')"

          payload="$(jq -n \
              --arg repository "${GITHUB_REPOSITORY}" \
              --arg commit_sha "${GITHUB_SHA}" \
              --arg branch "${GITHUB_REF_NAME}" \
              --arg github_run_id "${GITHUB_RUN_ID}" \
              --arg github_run_attempt "${github_run_attempt}" \
              --arg image "${IMAGE}" \
              --arg name_suffix "${name_suffix}" \
              --arg script "${script}" \
              --argjson args "${args_json_compact}" \
              --argjson env "${env_json_compact}" \
              --arg worker_replicas "${worker_replicas}" \
              '{repository:$repository,commit_sha:$commit_sha,branch:$branch,github_run_id:$github_run_id,github_run_attempt:$github_run_attempt,image:$image,name_suffix:$name_suffix,script:$script,args:$args,env:$env,worker_replicas:($worker_replicas | tonumber)}')"

          echo "========== Submit RayJob payload =========="
          echo "${payload}" | jq .

          response_file="$(mktemp)"
          http_code="$(curl -sS -o "${response_file}" -w "%{http_code}" -X POST "${SUBMITTER_URL}/api/v1/rayjobs" \
              -H "Content-Type: application/json" \
              -d "${payload}")"
          response="$(cat "${response_file}")"
          rm -f "${response_file}"

          echo "========== Submitter response =========="
          echo "http_code=${http_code}"
          echo "${response}"

          if ! printf '%s' "${response}" | jq . >/dev/null 2>&1; then
              echo "Submitter response is not valid JSON."
              printf '%s\n' "${response}"
              exit 1
          fi

          echo "${response}" | jq .

          if [[ "${http_code}" -lt 200 || "${http_code}" -ge 300 ]]; then
              echo "Submitter returned non-2xx status: ${http_code}"
              exit 1
          fi

          job_id="$(echo "${response}" | jq -r '.job_id // empty')"
          if [[ -z "${job_id}" || "${job_id}" == "null" ]]; then
              echo "Failed to parse job_id from submitter response."
              exit 1
          fi

          final_status_file="/tmp/rayjob-final-status-${job_id}"
          rm -f "${final_status_file}"

          set +e
          curl -N -sS \
              --retry 5 \
              --retry-delay 10 \
              --retry-all-errors \
              "${SUBMITTER_URL}/api/v1/rayjobs/${job_id}/watch?format=ndjson" \
          | while IFS= read -r event; do
              [[ -z "${event}" ]] && continue
              if ! printf '%s' "${event}" | jq . >/dev/null 2>&1; then
                  echo "[watch raw] ${event}"
                  continue
              fi

              type="$(printf '%s' "${event}" | jq -r '.type // empty')"
              case "${type}" in
                  log)
                      printf '%s' "${event}" | jq -r '.line // ""'
                      ;;
                  status)
                      status="$(printf '%s' "${event}" | jq -r '.status // "UNKNOWN"')"
                      message="$(printf '%s' "${event}" | jq -r '.message // ""')"
                      rayjob_status="$(printf '%s' "${event}" | jq -r '.rayjob_status // ""')"
                      deployment_status="$(printf '%s' "${event}" | jq -r '.job_deployment_status // ""')"
                      echo "[rayjob status] status=${status} rayjob_status=${rayjob_status} deployment_status=${deployment_status} ${message}"
                      ;;
                  final)
                      status="$(printf '%s' "${event}" | jq -r '.status // "UNKNOWN"')"
                      message="$(printf '%s' "${event}" | jq -r '.message // ""')"
                      echo "[rayjob final] ${status} ${message}"
                      printf '%s' "${status}" > "${final_status_file}"
                      ;;
                  error)
                      message="$(printf '%s' "${event}" | jq -r '.message // ""')"
                      echo "[rayjob error] ${message}"
                      ;;
                  *)
                      echo "${event}"
                      ;;
              esac
          done
          set -e

          final_status=""
          if [[ -f "${final_status_file}" ]]; then
              final_status="$(cat "${final_status_file}")"
          fi

          case "${final_status}" in
              SUCCEEDED) exit 0 ;;
              FAILED|TIMEOUT|NOT_FOUND) exit 1 ;;
              *) echo "Watch ended without successful final status."; exit 1 ;;
          esac
          EOF
          sed -i 's/^          //' /tmp/submit_and_wait_rayjob.sh
          chmod +x /tmp/submit_and_wait_rayjob.sh

      - name: Setup and Verify Cluster Network
        run: |
          echo "==== [1/2] Setting up network routing (Injecting K8s CoreDNS) ===="
          # 💡 If your kube-dns IP is not 10.96.0.10, change it below
          sudo sh -c 'cat <<EOF > /etc/resolv.conf
          nameserver 10.96.0.10
          search ci-system.svc.cluster.local svc.cluster.local cluster.local
          options ndots:5
          EOF'

          echo "==== [2/2] Testing network connectivity via healthz ===="
          curl -sS --fail "${SUBMITTER_URL}/healthz"

      - name: Run multinode E2E RayJob
        run: |
          /tmp/submit_and_wait_rayjob.sh \
            multinode-e2e \
            /root/.cache/cicd_test/run_multinode_testing.sh \
            '["--script-path","/verl/tests/special_npu/run_qwen3_06b_ppo_multinode.sh"]' \
            '{}'

      - name: Cleanup RayJobs
        if: always()
        run: |
          curl -sS -X DELETE \
            "${SUBMITTER_URL}/api/v1/workflows/${GITHUB_RUN_ID}?attempt=${GITHUB_RUN_ATTEMPT:-1}"
